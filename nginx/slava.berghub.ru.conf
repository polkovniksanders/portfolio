# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name slava.berghub.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name slava.berghub.ru;

    ssl_certificate     /etc/letsencrypt/live/slava.berghub.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/slava.berghub.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    root  /root/portfolio;
    index index.html;

    # SPA fallback — all routes → index.html
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Next.js static chunks are content-hashed → cache forever
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Other static assets
    location ~* \.(ico|svg|png|jpg|jpeg|gif|webp|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Gzip
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        image/svg+xml;
}
